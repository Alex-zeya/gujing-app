services:
  - type: web
    name: gujing-api
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8010
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://gujing-api.onrender.com,capacitor://localhost,ionic://localhost,gujing://localhost
      - key: SMS_PROVIDER
        value: mock
      - key: DAILY_BACKFILL_LIMIT
        value: 40
      - key: MIN_A_STOCK_DIRECTORY_COUNT
        value: 4500
      - key: DATABASE_URL
        fromDatabase:
          name: gujing-db
          property: connectionString
      - key: TUSHARE_TOKEN
        sync: false
      - key: PRIVACY_POLICY_URL
        value: https://gujing-api.onrender.com/privacy.html
      - key: APPLE_SIGN_IN_CLIENT_ID
        value: com.zeyawang.gujing
      - key: APPLE_BUNDLE_ID
        value: com.zeyawang.gujing
      - key: ALIYUN_SMS_ACCESS_KEY_ID
        sync: false
      - key: ALIYUN_SMS_ACCESS_KEY_SECRET
        sync: false
      - key: ALIYUN_SMS_SIGN_NAME
        sync: false
      - key: ALIYUN_SMS_TEMPLATE_CODE
        sync: false
      - key: ALIYUN_SMS_TEMPLATE_PARAM_NAME
        value: code
      - key: TENCENT_SMS_SECRET_ID
        sync: false
      - key: TENCENT_SMS_SECRET_KEY
        sync: false
      - key: TENCENT_SMS_SDK_APP_ID
        sync: false
      - key: TENCENT_SMS_SIGN_NAME
        sync: false
      - key: TENCENT_SMS_TEMPLATE_ID
        sync: false
      - key: TENCENT_SMS_REGION
        value: ap-guangzhou
      - key: TENCENT_SMS_TEMPLATE_PARAM_SET
        value: code,minutes
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: WECHAT_UNIVERSAL_LINK
        value: https://gujing-api.onrender.com/app/
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_BUNDLE_ID
        sync: false
databases:
  - name: gujing-db
    plan: free
