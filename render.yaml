services:
  - type: web
    name: gujing-api
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8010
      - key: CORS_ORIGINS
        value: capacitor://localhost,ionic://localhost,gujing://localhost
      - key: SMS_PROVIDER
        value: mock
